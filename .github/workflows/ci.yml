name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    name: "Ruby ${{ matrix.ruby }} / ${{ matrix.gemfile }}"
    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4", "4.0"]
        gemfile:
          - activerecord_6.1
          - activerecord_7.0
          - activerecord_7.1
          - activerecord_7.2
          - activerecord_8.0
        exclude:
          # Rails 6.1 / 7.0 do not support Ruby 3.4+
          - { ruby: "3.4", gemfile: activerecord_6.1 }
          - { ruby: "4.0", gemfile: activerecord_6.1 }
          - { ruby: "3.4", gemfile: activerecord_7.0 }
          - { ruby: "4.0", gemfile: activerecord_7.0 }
          # Rails 8.0 requires Ruby >= 3.2
          - { ruby: "3.1", gemfile: activerecord_8.0 }
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake spec
